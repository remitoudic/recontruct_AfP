version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: afp-postgres
    restart: always
    environment:
      POSTGRES_USER: afp_user
      POSTGRES_PASSWORD: afp_password
      POSTGRES_DB: afp_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./backend
    container_name: afp-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://afp_user:afp_password@db:5432/afp_db
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: afp-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
